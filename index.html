<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dolci Pusoni 🍫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sfere decorative galleggianti -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
  <div class="orb orb5"></div>

  <!-- Cioccolatini decorativi -->
  <div class="choc choc1">m</div>
  <div class="choc choc2">m</div>
  <div class="choc choc3">m</div>
  <div class="choc choc4">m</div>
  <div class="choc choc5">m</div>
  <div class="choc choc6">m</div>

  <main>
    <header>
      <div class="logo-wrap">
        <div class="logo-badge red">m</div>
        <div class="logo-badge yellow">m</div>
        <div class="logo-badge green">m</div>
        <div class="logo-badge blue">m</div>
        <div class="logo-badge orange">m</div>
      </div>
      <h1>Dolci Pusoni</h1>
      <p class="tagline">Il gioco degli M&M's</p>
    </header>

    <div class="card-imprevisto">
      <div class="card-deco"></div>
      <div class="card-inner">
        <p class="card-label">Hai pescato un imprevisto?</p>
        <p class="card-sub">Clicca e scopri la tua penitenza!</p>
        <button id="btnImprevisto" onclick="mostraImprevisto()">
          <span>⚡ IMPREVISTO!</span>
        </button>
      </div>
    </div>

    <footer>
      <span>🍫 Buona fortuna, dolce pusone! 🍫</span>
    </footer>
  </main>

  <!-- Overlay -->
  <div id="overlay" onclick="chiudiPopup()"></div>

  <!-- Popup -->
  <div id="popup" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
    <div class="popup-top">
      <div class="popup-emoji" id="popupEmoji" aria-hidden="true">🎲</div>
      <div class="popup-badge-row">
        <span class="pbadge red">m</span>
        <h2 id="popupTitle">IMPREVISTO!</h2>
        <span class="pbadge blue">m</span>
      </div>
    </div>
    <div class="popup-body">
      <p id="testoImprevisto"></p>
    </div>
    <button class="btn-ok" onclick="chiudiPopup()">✓ Ho capito!</button>
    <button class="btn-close" onclick="chiudiPopup()" aria-label="Chiudi">✕</button>
  </div>

  <script src="imprevisti.js"></script>
  <script src="app.js"></script>
</body>
</html>
